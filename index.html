<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>BIW Field Tools</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a0f14">
<meta name="description" content="BIW Field Tools — Time Sheet, Checklist, Installation Report, Empty Timesheet, Expenses">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BIW Tools">
<meta name="mobile-web-app-capable" content="yes">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:#1a0f14;color:#fff;font-family:-apple-system,"Segoe UI",Roboto,Arial,sans-serif;overflow:hidden}

/* ============ المشهد الحي (صورة + طبقات حركة مثبتة على بكسلات الصورة) ============ */
.stage{position:fixed;top:0;right:0;bottom:0;left:0;overflow:hidden;background:#1a0f14}
#scene{position:absolute;left:0;top:0;width:1672px;height:941px;transform-origin:0 0;will-change:transform}
#kb{position:absolute;left:0;top:0;width:100%;height:100%;
  -webkit-animation:kenburns 36s ease-in-out infinite alternate;animation:kenburns 36s ease-in-out infinite alternate}
#kb>img{position:absolute;left:0;top:0;width:100%;height:100%;display:block}
@-webkit-keyframes kenburns{from{-webkit-transform:scale(1)}to{-webkit-transform:scale(1.055) translateY(-8px)}}
@keyframes kenburns{from{transform:scale(1)}to{transform:scale(1.055) translateY(-8px)}}

/* ---- نواسة متحركة على الأفق (نفس لون سلويت النواسات الأصلية) ---- */
.pj{position:absolute;overflow:visible}
.pj .beam{transform-origin:38px 22px;-webkit-animation:pjnod 5.6s ease-in-out infinite;animation:pjnod 5.6s ease-in-out infinite}
.pj .crank{transform-origin:58px 46px;-webkit-animation:pjspin 5.6s linear infinite;animation:pjspin 5.6s linear infinite}
@-webkit-keyframes pjnod{0%,100%{-webkit-transform:rotate(-7deg)}50%{-webkit-transform:rotate(7deg)}}
@keyframes pjnod{0%,100%{transform:rotate(-7deg)}50%{transform:rotate(7deg)}}
@-webkit-keyframes pjspin{from{-webkit-transform:rotate(0)}to{-webkit-transform:rotate(360deg)}}
@keyframes pjspin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

/* ---- طيور تعبر السما ---- */
.flock{position:absolute;will-change:transform}
.flock .wing{transform-origin:center;-webkit-animation:flap .5s ease-in-out infinite;animation:flap .5s ease-in-out infinite}
@-webkit-keyframes flap{0%,100%{-webkit-transform:scaleY(.35)}50%{-webkit-transform:scaleY(1)}}
@keyframes flap{0%,100%{transform:scaleY(.35)}50%{transform:scaleY(1)}}
#flock1{-webkit-animation:fly1 34s linear infinite;animation:fly1 34s linear infinite}
#flock2{-webkit-animation:fly2 47s linear -18s infinite;animation:fly2 47s linear -18s infinite}
@-webkit-keyframes fly1{0%{-webkit-transform:translate(1740px,275px);opacity:0}3%{opacity:.85}46%{opacity:.85}55%{-webkit-transform:translate(-160px,205px);opacity:0}100%{-webkit-transform:translate(-160px,205px);opacity:0}}
@keyframes fly1{0%{transform:translate(1740px,275px);opacity:0}3%{opacity:.85}46%{opacity:.85}55%{transform:translate(-160px,205px);opacity:0}100%{transform:translate(-160px,205px);opacity:0}}
@-webkit-keyframes fly2{0%{-webkit-transform:translate(1760px,150px) scale(.6);opacity:0}4%{opacity:.7}55%{opacity:.7}62%{-webkit-transform:translate(-140px,230px) scale(.6);opacity:0}100%{-webkit-transform:translate(-140px,230px) scale(.6);opacity:0}}
@keyframes fly2{0%{transform:translate(1760px,150px) scale(.6);opacity:0}4%{opacity:.7}55%{opacity:.7}62%{transform:translate(-140px,230px) scale(.6);opacity:0}100%{transform:translate(-140px,230px) scale(.6);opacity:0}}

/* ---- دخان/بخار ينجرف مع الهواء ---- */
.smoke{position:absolute;border-radius:50%;pointer-events:none;filter:blur(7px);
  background:radial-gradient(circle,rgba(70,40,30,.5),rgba(70,40,30,0) 70%)}
@-webkit-keyframes drift{0%{-webkit-transform:translate(0,0) scale(.5);opacity:0}12%{opacity:.5}100%{-webkit-transform:translate(190px,-230px) scale(2.4);opacity:0}}
@keyframes drift{0%{transform:translate(0,0) scale(.5);opacity:0}12%{opacity:.5}100%{transform:translate(190px,-230px) scale(2.4);opacity:0}}

/* ---- ملاءات غبار تنجرف مع الريح فوق الأرض ---- */
.dust{position:absolute;pointer-events:none;filter:blur(10px);border-radius:50%;
  background:radial-gradient(ellipse,rgba(200,120,60,.16),transparent 70%)}
@-webkit-keyframes dustdrift{0%{-webkit-transform:translateX(-260px);opacity:0}18%{opacity:1}80%{opacity:.8}100%{-webkit-transform:translateX(1900px);opacity:0}}
@keyframes dustdrift{0%{transform:translateX(-260px);opacity:0}18%{opacity:1}80%{opacity:.8}100%{transform:translateX(1900px);opacity:0}}

/* ---- ضباب سما رقيق يمشي ---- */
.haze{position:absolute;left:-30%;width:160%;pointer-events:none;filter:blur(14px);
  background:linear-gradient(90deg,transparent,rgba(255,205,150,.10) 30%,rgba(255,225,180,.16) 50%,rgba(255,205,150,.10) 70%,transparent)}
@-webkit-keyframes hazemove{from{-webkit-transform:translateX(-14%)}to{-webkit-transform:translateX(14%)}}
@keyframes hazemove{from{transform:translateX(-14%)}to{transform:translateX(14%)}}

/* ---- لمعات الماء ---- */
.glint{position:absolute;height:3px;border-radius:2px;pointer-events:none;
  background:linear-gradient(90deg,transparent,rgba(255,235,180,.85),transparent)}
@-webkit-keyframes glint{0%,100%{opacity:0;-webkit-transform:scaleX(.4)}50%{opacity:.9;-webkit-transform:scaleX(1)}}
@keyframes glint{0%,100%{opacity:0;transform:scaleX(.4)}50%{opacity:.9;transform:scaleX(1)}}

/* ---- أضواء تحذير تنبض (أعلى البرج + رأس الكرين) ---- */
.beacon{position:absolute;width:7px;height:7px;border-radius:50%;pointer-events:none}
.beacon.red{background:#ff4433;box-shadow:0 0 10px 3px rgba(255,70,50,.75);
  -webkit-animation:beak 2.6s ease-in-out infinite;animation:beak 2.6s ease-in-out infinite}
.beacon.amber{background:#ffb340;box-shadow:0 0 9px 3px rgba(255,180,70,.7);
  -webkit-animation:beak 3.4s ease-in-out -1.2s infinite;animation:beak 3.4s ease-in-out -1.2s infinite}
@-webkit-keyframes beak{0%,100%{opacity:.15}12%,20%{opacity:1}32%{opacity:.15}}
@keyframes beak{0%,100%{opacity:.15}12%,20%{opacity:1}32%{opacity:.15}}

/* نبض توهج الشمس (طبقة ضوء فوق الصورة، ما تغير شكلها) */
.sunGlow{position:absolute;left:700px;top:470px;width:1250px;height:1250px;margin:-625px 0 0 -625px;
  pointer-events:none;
  background:radial-gradient(circle,rgba(255,205,120,.28) 0%,rgba(255,150,60,.12) 26%,transparent 55%);
  -webkit-animation:breath 6.5s ease-in-out infinite;animation:breath 6.5s ease-in-out infinite}
@-webkit-keyframes breath{0%,100%{opacity:.55}50%{opacity:1}}
@keyframes breath{0%,100%{opacity:.55}50%{opacity:1}}

/* لمعان يتنفس على الماء (أسفل الصورة) */
.waterShine{position:absolute;left:0;right:0;bottom:0;height:34%;pointer-events:none;
  background:linear-gradient(180deg,transparent,rgba(255,170,90,.10) 45%,rgba(255,190,110,.16) 70%,transparent);
  -webkit-animation:breath 9s ease-in-out -3s infinite;animation:breath 9s ease-in-out -3s infinite}

/* شرر / غبار ذهبي يطفو */
.ember{position:absolute;border-radius:50%;pointer-events:none;
  background:#ffc46a;
  background:radial-gradient(circle at 35% 30%,rgba(255,225,170,.95),rgba(255,170,80,.45) 60%,transparent 75%);
  box-shadow:0 0 8px rgba(255,190,110,.5)}
@-webkit-keyframes floatUp{0%{-webkit-transform:translateY(0) translateX(0);opacity:0}8%{opacity:.85}55%{-webkit-transform:translateY(-46vh) translateX(10px);opacity:.55}100%{-webkit-transform:translateY(-92vh) translateX(-6px);opacity:0}}
@keyframes floatUp{0%{transform:translateY(0) translateX(0);opacity:0}8%{opacity:.85}55%{transform:translateY(-46vh) translateX(10px);opacity:.55}100%{transform:translateY(-92vh) translateX(-6px);opacity:0}}
@-webkit-keyframes floatUpB{0%{-webkit-transform:translateY(0);opacity:0}8%{opacity:.7}55%{-webkit-transform:translateY(-44vh) translateX(-12px);opacity:.45}100%{-webkit-transform:translateY(-88vh) translateX(8px);opacity:0}}
@keyframes floatUpB{0%{transform:translateY(0);opacity:0}8%{opacity:.7}55%{transform:translateY(-44vh) translateX(-12px);opacity:.45}100%{transform:translateY(-88vh) translateX(8px);opacity:0}}

/* تظليل خفيف فوق وتحت عشان وضوح النصوص — شفاف جدًا ما يغير الصورة */
.vig-top{position:absolute;top:0;left:0;right:0;height:22%;pointer-events:none;
  background:linear-gradient(180deg,rgba(12,6,10,.62),transparent)}
.vig-bot{position:absolute;bottom:0;left:0;right:0;height:38%;pointer-events:none;
  background:linear-gradient(0deg,rgba(10,5,9,.78) 0%,rgba(10,5,9,.35) 55%,transparent)}

/* ============ الهيدر ============ */
header{position:fixed;top:0;left:0;right:0;z-index:6;text-align:center;
  padding-top:calc(16px + env(safe-area-inset-top))}
.brand-title{font-size:25px;font-weight:800;letter-spacing:5px;color:#fff;direction:ltr;
  text-shadow:0 2px 22px rgba(0,0,0,.9),0 0 8px rgba(0,0,0,.5)}
.brand-sub{margin-top:5px;font-size:10px;letter-spacing:3.5px;color:rgba(255,226,196,.92);direction:ltr;
  text-shadow:0 1px 12px rgba(0,0,0,.85)}
.brand-line{width:64px;height:2px;margin:10px auto 0;background:#ffc46a;border-radius:2px;
  box-shadow:0 0 14px rgba(255,196,106,.9)}

/* ============ الأيقونات الأربع الشفافة — صف واحد تحت ============ */
nav{position:fixed;right:10px;top:50%;z-index:6;
  -webkit-transform:translateY(-46%);transform:translateY(-46%);
  text-align:center;font-size:0}
.glass{display:block;font-size:12px;text-decoration:none;color:#fff;margin:9px 0}
.glass-orb{position:relative;display:block;width:92px;height:92px;margin:0 auto;border-radius:50%;
  background:rgba(20,14,18,.30);
  border:1.5px solid rgba(255,255,255,.34);
  box-shadow:0 8px 26px rgba(0,0,0,.45), inset 0 1px 1px rgba(255,255,255,.22);
  -webkit-backdrop-filter:blur(9px);backdrop-filter:blur(9px);
  opacity:0;-webkit-transform:translateY(20px);transform:translateY(20px);
  -webkit-transition:-webkit-transform .22s ease, border-color .22s ease, background .22s ease;
  transition:transform .22s ease, border-color .22s ease, background .22s ease}
.glass-orb.show{-webkit-animation:up .5s cubic-bezier(.25,1.35,.4,1) forwards;animation:up .5s cubic-bezier(.25,1.35,.4,1) forwards}
@-webkit-keyframes up{to{opacity:1;-webkit-transform:translateY(0)}}
@keyframes up{to{opacity:1;transform:translateY(0)}}
.glass:active .glass-orb{-webkit-transform:scale(.92);transform:scale(.92);background:rgba(255,196,106,.22);border-color:#ffc46a}
.glass-orb:after{content:"";position:absolute;top:-2px;right:-2px;bottom:-2px;left:-2px;border-radius:50%;
  border:2px solid rgba(255,196,106,.9);opacity:0;pointer-events:none}
.glass-orb.tapped:after{-webkit-animation:ripple .55s ease-out;animation:ripple .55s ease-out}
@-webkit-keyframes ripple{0%{opacity:.9;-webkit-transform:scale(1)}100%{opacity:0;-webkit-transform:scale(1.55)}}
@keyframes ripple{0%{opacity:.9;transform:scale(1)}100%{opacity:0;transform:scale(1.55)}}
@media (hover:hover){
  .glass:hover .glass-orb{-webkit-transform:translateY(-5px);transform:translateY(-5px);
    border-color:#ffc46a;background:rgba(255,170,80,.16);
    box-shadow:0 14px 30px rgba(0,0,0,.55),0 0 22px rgba(255,190,110,.45), inset 0 1px 1px rgba(255,255,255,.25)}
}
.glass-ico{position:absolute;top:50%;left:50%;width:42px;height:42px;margin:-21px 0 0 -21px}
.glass-ico path,.glass-ico circle,.glass-ico line,.glass-ico rect{stroke:#fff;stroke-width:2.3;fill:none;stroke-linecap:round;stroke-linejoin:round}
.glass-en{display:block;margin-top:9px;font-size:10.5px;font-weight:800;letter-spacing:.6px;direction:ltr;
  text-shadow:0 1px 10px rgba(0,0,0,.9)}
.glass-ar{display:block;margin-top:2px;font-size:10px;color:rgba(255,232,205,.95);text-shadow:0 1px 8px rgba(0,0,0,.9)}


/* ============ أيقونة المصاريف — يسار لحالها ============ */
.nav-left{position:fixed;left:10px;right:auto;top:50%;z-index:6;width:auto;
  -webkit-transform:translateY(-46%);transform:translateY(-46%);
  text-align:center;font-size:0}
@media (min-width:760px){
  .nav-left{left:22px;right:auto;top:auto;width:auto;
    bottom:calc(84px + env(safe-area-inset-bottom));
    -webkit-transform:none;transform:none;padding:0}
  .nav-left .glass{display:block;width:auto;max-width:none;margin:0}
}

/* ============ توقيع المطور ============ */
.devsig{position:fixed;left:14px;top:calc(104px + env(safe-area-inset-top));z-index:5;direction:ltr;
  font-family:"Courier New",monospace;font-size:11px;letter-spacing:1px;color:#000;font-weight:700;
  text-shadow:0 0 6px rgba(255,255,255,.45);pointer-events:none;white-space:nowrap}

/* ============ الشريط السفلي ============ */
.dock{position:fixed;left:0;right:0;bottom:0;z-index:6;text-align:center;
  padding-bottom:calc(12px + env(safe-area-inset-bottom))}
.dock-inner{display:inline-block;padding:8px 13px;border-radius:999px;
  background:rgba(14,9,13,.62);border:1px solid rgba(255,255,255,.16);
  -webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px)}
.net,.ver{display:inline-block;vertical-align:middle;font-family:"Courier New",monospace;direction:ltr}
.net{font-size:10.5px;letter-spacing:1px;color:#8fe3cf}
.net .dot{display:inline-block;vertical-align:middle;width:8px;height:8px;margin-right:6px;border-radius:50%;
  background:#7fd1c0;box-shadow:0 0 8px #7fd1c0;
  -webkit-animation:pulse 2.2s ease infinite;animation:pulse 2.2s ease infinite}
.net.off{color:#f0c98c}
.net.off .dot{background:#ffb35c;box-shadow:0 0 8px #ffb35c}
@-webkit-keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.sep{display:inline-block;vertical-align:middle;width:1px;height:15px;margin:0 11px;background:rgba(255,255,255,.2)}
.ver{font-size:10px;letter-spacing:1px;color:rgba(255,255,255,.55)}
.upd{display:inline-block;vertical-align:middle;margin-left:11px;padding:6px 13px;border-radius:999px;
  border:1px solid rgba(255,196,106,.6);background:rgba(255,170,80,.14);color:#ffdcae;
  font-size:10.5px;letter-spacing:1px;cursor:pointer;font-family:"Courier New",monospace;direction:ltr}
.upd:active{background:rgba(255,170,80,.32)}
.upd-top{position:absolute;top:calc(14px + env(safe-area-inset-top));left:14px;z-index:7;
  padding:8px 14px;font-size:11px;background:rgba(14,9,13,.55);
  -webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px)}
.upd[disabled]{opacity:.5}

/* ============ آيباد / عريض ============ */
@media (min-width:760px){
  .brand-title{font-size:34px}
  nav{right:0;left:0;top:auto;bottom:calc(84px + env(safe-area-inset-bottom));
    -webkit-transform:none;transform:none;padding:0 10px}
  .glass{display:inline-block;vertical-align:top;width:24%;max-width:190px;margin:0 4px}
  .glass-orb{width:126px;height:126px;
    background:rgba(210,230,255,.10);border-color:rgba(220,240,255,.5);
    -webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px)}
  .glass-ico{width:54px;height:54px;margin:-27px 0 0 -27px}
  .glass-en{font-size:13.5px;margin-top:12px}
  .glass-ar{font-size:12px}
}
/* هواتف قصيرة */
@media (max-height:660px){
  .glass-orb{width:64px;height:64px}
  .glass-ico{width:28px;height:28px;margin:-14px 0 0 -14px}
}
@media (prefers-reduced-motion:reduce){
  #kb,.sunGlow,.waterShine,.ember,.net .dot,.pj .beam,.pj .crank,.flock,.flock *,.smoke,.dust,.haze,.glint,.beacon{-webkit-animation:none!important;animation:none!important}
  .glass-orb{opacity:1;-webkit-transform:none;transform:none;-webkit-animation:none!important;animation:none!important}
}

/* ============ رسالة التحديث الإجباري ============ */
#updModal{position:fixed;inset:0;z-index:99;display:none;background:rgba(10,5,9,.82);
  -webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px)}
#updModal.on{display:block}
.updBox{position:absolute;left:50%;top:50%;-webkit-transform:translate(-50%,-50%);transform:translate(-50%,-50%);
  width:min(88vw,420px);padding:26px 22px;border-radius:20px;text-align:center;direction:rtl;
  background:rgba(24,14,18,.92);border:1.5px solid rgba(255,196,106,.55);
  box-shadow:0 18px 60px rgba(0,0,0,.6),0 0 30px rgba(255,170,80,.12)}
.updBox h2{font-size:19px;color:#ffdcae;margin-bottom:4px}
.updBox .uv{font-family:"Courier New",monospace;direction:ltr;font-size:13px;color:#ffc46a;letter-spacing:1px}
.updBox ul{list-style:none;margin:16px 0 20px;text-align:right}
.updBox li{font-size:13.5px;line-height:1.5;color:rgba(255,255,255,.9);margin:8px 0;padding-right:18px;position:relative}
.updBox li:before{content:"";position:absolute;right:0;top:8px;width:7px;height:7px;border-radius:50%;
  background:#ffc46a;box-shadow:0 0 8px rgba(255,196,106,.8)}
.updGo{display:block;width:100%;padding:13px;border-radius:12px;border:none;cursor:pointer;
  background:linear-gradient(135deg,#ffb340,#ff8a3c);color:#2a1006;font-size:15px;font-weight:800;
  box-shadow:0 6px 20px rgba(255,150,60,.35)}
.updGo:active{-webkit-transform:scale(.98);transform:scale(.98)}
.updGo[disabled]{opacity:.6}
.updNote{margin-top:10px;font-size:11px;color:rgba(255,255,255,.5)}
</style>
</head>
<body>

<div class="stage" aria-hidden="true">
  <div id="scene">
    <div id="kb">
      <img src="bg.jpg" alt="" draggable="false">

      <!-- ضباب سما رقيق يمشي -->
      <div class="haze" style="top:110px;height:130px;-webkit-animation:hazemove 26s ease-in-out infinite alternate;animation:hazemove 26s ease-in-out infinite alternate"></div>
      <div class="haze" style="top:280px;height:100px;opacity:.7;-webkit-animation:hazemove 34s ease-in-out -12s infinite alternate-reverse;animation:hazemove 34s ease-in-out -12s infinite alternate-reverse"></div>

      <!-- توهج الشمس + لمعان الماء -->
      <div class="sunGlow"></div>

      <!-- نواسة متحركة على الأفق (تنضم لصف النواسات الأصلية) -->
      <svg id="pj1" class="pj" style="left:1008px;top:472px" width="78" height="52" viewBox="0 0 78 52">
        <g fill="#2a1006">
          <rect x="36" y="46" width="30" height="3"/>
          <path d="M30 49 L38 21 L46 49 Z M34.5 49 L38 30 L41.5 49 Z" fill-rule="evenodd"/>
          <g class="crank"><circle cx="58" cy="46" r="5.5"/><rect x="56.8" y="34" width="2.4" height="12"/></g>
          <g class="beam">
            <rect x="10" y="20" width="52" height="3.4" rx="1.4"/>
            <path d="M10 21.7 q-6 -3 -7 3 q-1 6 4 6 q5 0 3 -9 Z"/>
            <rect x="6" y="26" width="1.8" height="16"/>
            <rect x="58" y="22" width="2" height="16"/>
          </g>
        </g>
      </svg>

      

      

      

      <!-- أسراب طيور -->
      <svg id="flock1" class="flock" width="90" height="34" viewBox="0 0 90 34">
        <g stroke="#1d0c08" stroke-width="2" fill="none" stroke-linecap="round">
          <path class="wing" d="M6 16 q5 -6 10 0 q5 -6 10 0"/>
          <path class="wing" style="animation-delay:-.18s" d="M38 8 q4 -5 8 0 q4 -5 8 0"/>
          <path class="wing" style="animation-delay:-.33s" d="M64 20 q4 -5 8 0 q4 -5 8 0"/>
        </g>
      </svg>
      <svg id="flock2" class="flock" width="70" height="26" viewBox="0 0 70 26">
        <g stroke="#241009" stroke-width="2" fill="none" stroke-linecap="round">
          <path class="wing" d="M6 14 q4 -5 8 0 q4 -5 8 0"/>
          <path class="wing" style="animation-delay:-.22s" d="M40 8 q4 -5 8 0 q4 -5 8 0"/>
        </g>
      </svg>

      <!-- دخان معدات ينجرف يمين مع الريح -->
      <span class="smoke" style="left:596px;top:520px;width:44px;height:44px;-webkit-animation:drift 11s linear infinite;animation:drift 11s linear infinite"></span>
      <span class="smoke" style="left:588px;top:526px;width:34px;height:34px;-webkit-animation:drift 11s linear -4s infinite;animation:drift 11s linear -4s infinite"></span>
      <span class="smoke" style="left:604px;top:522px;width:38px;height:38px;-webkit-animation:drift 11s linear -8s infinite;animation:drift 11s linear -8s infinite"></span>

<script>
/* تثبيت المشهد على قياس الشاشة (نفس سلوك cover, left 42%) */
(function(){
  var sc=document.getElementById('scene'),W=1672,H=941;
  function fit(){
    var vw=window.innerWidth,vh=window.innerHeight;
    var s=Math.max(vw/W,vh/H)*1.03;               /* 3% زيادة لحركة كين بيرنز */
    var x=Math.min(0,(vw-W*s)*0);                  /* محاذاة يسار */
    var y=(vh-H*s)*0.42;                           /* 42% عمودي */
    sc.style.transform='translate('+x+'px,'+y+'px) scale('+s+')';
    sc.style.webkitTransform='translate('+x+'px,'+y+'px) scale('+s+')';
  }
  window.addEventListener('resize',fit);window.addEventListener('orientationchange',fit);fit();
})();
/* فحص التحديث الإجباري: فقط مع وجود نت + نسخة أحدث */
(function(){
  var CUR='3.10.3';                       /* نسخة هذا الملف */
  function toNum(v){var p=String(v).replace(/^v/,'').split('.');return (+p[0]||0)*10000+(+p[1]||0)*100+(+p[2]||0);}
  function doUpdate(btn){
    btn.disabled=true;btn.textContent='... يحدّث';
    var done=function(){location.reload();};
    try{
      var p=[];
      if(window.caches&&caches.keys){p.push(caches.keys().then(function(ks){return Promise.all(ks.map(function(k){return caches.delete(k);}));}));}
      if(navigator.serviceWorker&&navigator.serviceWorker.getRegistrations){p.push(navigator.serviceWorker.getRegistrations().then(function(rs){return Promise.all(rs.map(function(r){return r.unregister();}));}));}
      Promise.all(p).then(done,done);setTimeout(done,6000);
    }catch(e){done();}
  }
  function check(){
    if(!navigator.onLine)return;                                   /* بدون نت: ولا شي */
    fetch('version.json?t='+Date.now(),{cache:'no-store'}).then(function(r){
      if(!r.ok)return null;return r.json();
    }).then(function(remote){
      if(!remote||!remote.version)return;
      /* نقارن مع نسخة الصفحة المعروضة نفسها (CUR) — حتمي، بلا سباق مع تحديث الكاش بالخلفية */
      if(toNum(remote.version)<=toNum(CUR))return;                  /* ما في أجدد: ولا شي */
      var m=document.getElementById('updModal');
      document.getElementById('updVer').textContent='v'+CUR+'  \u2190  v'+String(remote.version).replace(/^v/,'');
      var ul=document.getElementById('updNotes');ul.innerHTML='';
      (remote.notes||[]).forEach(function(n){var li=document.createElement('li');li.textContent=n;ul.appendChild(li);});
      m.classList.add('on');
      var btn=document.getElementById('updGo');
      btn.onclick=function(){if(!navigator.onLine){btn.textContent='\u26a0 تحتاج نت';setTimeout(function(){btn.textContent='تحديث الآن';},2200);return;}doUpdate(btn);};
    }).catch(function(){});
  }
  window.addEventListener('load',function(){setTimeout(check,1200);});
  window.addEventListener('online',function(){setTimeout(check,800);});
})();
/* مؤشر الاتصال */
(function(){
  var chip=document.getElementById('net'), tx=document.getElementById('netTx');
  function set(){var on=navigator.onLine;chip.classList.toggle('off',!on);tx.textContent=on?'ONLINE':'OFFLINE';}
  window.addEventListener('online',set);window.addEventListener('offline',set);set();
})();
/* ظهور الأيقونات متدرج + موجة عند الضغط */
(function(){
  var orbs=document.querySelectorAll('.glass-orb');
  for(var i=0;i<orbs.length;i++){
    (function(el,d){
      setTimeout(function(){el.classList.add('show');},350+d*110);
      el.parentElement.addEventListener('touchstart',function(){el.classList.remove('tapped');void el.offsetWidth;el.classList.add('tapped');},{passive:true});
      el.parentElement.addEventListener('mousedown',function(){el.classList.remove('tapped');void el.offsetWidth;el.classList.add('tapped');});
    })(orbs[i],i);
  }
})();
/* زر التحديث: يمسح الكاش ويسحب أحدث نسخة */
(function(){
  var btn=document.getElementById('updBtn');
  btn.addEventListener('click',function(){
    if(!navigator.onLine){btn.textContent='⚠ تحتاج نت';setTimeout(function(){btn.textContent='⟳ UPDATE';},2200);return;}
    btn.disabled=true;btn.textContent='... يحدّث';
    var done=function(){location.reload();};
    try{
      var p=[];
      if(window.caches&&caches.keys){p.push(caches.keys().then(function(ks){return Promise.all(ks.map(function(k){return caches.delete(k);}));}));}
      if(navigator.serviceWorker&&navigator.serviceWorker.getRegistrations){p.push(navigator.serviceWorker.getRegistrations().then(function(rs){return Promise.all(rs.map(function(r){return r.unregister();}));}));}
      Promise.all(p).then(done,done);
      setTimeout(done,6000);
    }catch(e){done();}
  });
})();
/* النسخة تنقرا من كاش الـ SW الفعّال */
(function(){
  function showVer(){
    if(!window.caches||!caches.keys)return;
    caches.keys().then(function(ks){
      for(var i=0;i<ks.length;i++){
        var m=ks[i].match(/^biw-field-tools-(v[\d.]+)$/);
        if(m){var el=document.getElementById('verTx');if(el)el.textContent=m[1];}
      }
    });
  }
  showVer();setTimeout(showVer,4000);setTimeout(showVer,12000);
})();
/* تسجيل الأوفلاين + مؤشر "كل شي محمّل" */
(function(){
  var state=document.getElementById('cacheState');
  function setState(t,ok){if(state){state.textContent=t;state.style.color=ok?'#8fe3cf':'rgba(255,255,255,.55)';}}
  if(!('serviceWorker' in navigator)){setState('NO-SW',false);return;}
  setState('LOADING...',false);
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('sw.js').then(function(reg){
      function watch(sw){
        if(!sw){return;}
        sw.addEventListener('statechange',function(){
          if(sw.state==='activated'){verify();}
        });
      }
      if(reg.active){verify();}
      watch(reg.installing||reg.waiting);
      reg.addEventListener('updatefound',function(){watch(reg.installing);});
    }).catch(function(){setState('SW-ERR',false);});
  });
  function verify(){
    /* نتأكد فعليًا إن كل الصفحات والمكتبات بالكاش */
    if(!window.caches){setState('READY',true);return;}
    var must=['timesheet.html','checklist.html','report.html','empty-timesheet.html','expenses.html','month-timesheet.html','libs/jspdf.umd.min.js','libs/html2canvas.min.js','bg.jpg'];
    caches.keys().then(function(ks){
      var name=null;
      for(var i=0;i<ks.length;i++){if(ks[i].indexOf('biw-field-tools')===0){name=ks[i];}}
      if(!name){setState('LOADING...',false);setTimeout(verify,2500);return;}
      caches.open(name).then(function(c){
        Promise.all(must.map(function(u){return c.match(u,{ignoreSearch:true});})).then(function(rs){
          var missing=0;
          for(var i=0;i<rs.length;i++){if(!rs[i])missing++;}
          if(missing===0){setState('\u2713 OFFLINE READY',true);}
          else{setState('LOADING '+(must.length-missing)+'/'+must.length,false);setTimeout(verify,3000);}
        });
      });
    });
  }
})();
</script>
